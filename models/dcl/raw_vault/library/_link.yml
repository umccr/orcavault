version: 2

models:

  - name: link_library_project
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ library_project_hk ]
        warn_unenforced: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - project_hk
              - library_hk
    columns:
      - name: library_project_hk
        data_type: char(64)
        data_tests:
          - not_null
          - unique
      - name: project_hk
        data_type: char(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_project')
                field: project_hk
      - name: library_hk
        data_type: char(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_library')
                field: library_hk
      - name: load_datetime
        data_type: timestamptz
        data_tests:
          - not_null
      - name: record_source
        data_type: varchar(100)

