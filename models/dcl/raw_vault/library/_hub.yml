version: 2

models:

  - name: hub_library
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ library_hk ]
        warn_unenforced: false
    columns:
      - name: library_hk
        data_type: char(64)
        data_tests:
          - unique
          - not_null
      - name: library_id
        data_type: varchar(255)
      - name: load_datetime
        data_type: timestamptz
      - name: record_source
        data_type: varchar(100)
      - name: last_seen_datetime
        data_type: timestamptz
