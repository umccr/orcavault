version: 2

models:

  - name: hub_internal_subject
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ internal_subject_hk ]
        warn_unenforced: false
    columns:
      - name: internal_subject_hk
        data_type: char(64)
        data_tests:
          - unique
          - not_null
      - name: internal_subject_id
        data_type: varchar(255)
      - name: load_datetime
        data_type: timestamptz
      - name: record_source
        data_type: varchar(100)
      - name: last_seen_datetime
        data_type: timestamptz

  - name: hub_external_subject
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ external_subject_hk ]
        warn_unenforced: false
    columns:
      - name: external_subject_hk
        data_type: char(64)
        data_tests:
          - unique
          - not_null
      - name: external_subject_id
        data_type: varchar(255)
      - name: load_datetime
        data_type: timestamptz
      - name: record_source
        data_type: varchar(100)
      - name: last_seen_datetime
        data_type: timestamptz
