version: 2

models:

  - name: hub_project
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ project_hk ]
        warn_unenforced: false
    columns:
      - name: project_hk
        data_type: char(64)
        data_tests:
          - unique
          - not_null
      - name: project_id
        data_type: varchar(255)
      - name: load_datetime
        data_type: timestamptz
      - name: record_source
        data_type: varchar(100)
      - name: last_seen_datetime
        data_type: timestamptz

  - name: hub_owner
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ owner_hk ]
        warn_unenforced: false
    columns:
      - name: owner_hk
        data_type: char(64)
        data_tests:
          - unique
          - not_null
      - name: owner_id
        data_type: varchar(255)
      - name: load_datetime
        data_type: timestamptz
      - name: record_source
        data_type: varchar(100)
      - name: last_seen_datetime
        data_type: timestamptz
