version: 2

models:

  - name: sat_project_mm
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ project_hk, load_datetime, hash_diff ]
        warn_unenforced: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - project_hk
              - load_datetime
              - hash_diff
    columns:
      - name: project_hk
        data_type: char(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_project')
                field: project_hk
      - name: load_datetime
        data_type: timestamptz
        data_tests:
          - not_null
      - name: record_source
        data_type: varchar(100)
      - name: hash_diff
        data_type: char(64)
        data_tests:
          - not_null
      - name: orcabus_id
        data_type: char(26)
      - name: name
        data_type: varchar(255)
      - name: description
        data_type: varchar(255)
      - name: op
        data_type: char(1)
      - name: _dms_cdc_timestamp
        data_type: timestamptz

  - name: sat_owner_mm
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ owner_hk, load_datetime, hash_diff ]
        warn_unenforced: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - owner_hk
              - load_datetime
              - hash_diff
    columns:
      - name: owner_hk
        data_type: char(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_owner')
                field: owner_hk
      - name: load_datetime
        data_type: timestamptz
        data_tests:
          - not_null
      - name: record_source
        data_type: varchar(100)
      - name: hash_diff
        data_type: char(64)
        data_tests:
          - not_null
      - name: orcabus_id
        data_type: char(26)
      - name: name
        data_type: varchar(255)
      - name: description
        data_type: varchar(255)
      - name: email
        data_type: varchar(255)
      - name: op
        data_type: char(1)
      - name: _dms_cdc_timestamp
        data_type: timestamptz
