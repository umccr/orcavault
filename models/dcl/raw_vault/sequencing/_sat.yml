version: 2

models:

  - name: sat_sequencing_run_detail
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ sequencing_run_hk, load_datetime, hash_diff ]
        warn_unenforced: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sequencing_run_hk
              - load_datetime
              - hash_diff
    columns:
      - name: sequencing_run_hk
        data_type: char(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_sequencing_run')
                field: sequencing_run_hk
      - name: load_datetime
        data_type: timestamptz
        data_tests:
          - not_null
      - name: record_source
        data_type: varchar(100)
      - name: hash_diff
        data_type: char(64)
        data_tests:
          - not_null
      - name: orcabus_id
        data_type: char(26)
      - name: run_volume_name
        data_type: varchar(255)
      - name: run_folder_path
        data_type: varchar(255)
      - name: run_data_uri
        data_type: varchar(255)
      - name: status
        data_type: varchar(255)
      - name: start_time
        data_type: timestamptz
      - name: end_time
        data_type: timestamptz
      - name: reagent_barcode
        data_type: varchar(255)
      - name: flowcell_barcode
        data_type: varchar(255)
      - name: sample_sheet_name
        data_type: varchar(255)
      - name: basespace_run_id
        data_type: varchar(255)
      - name: sequence_run_name
        data_type: varchar(255)
      - name: v1pre3_id
        data_type: varchar(255)
      - name: ica_project_id
        data_type: varchar(255)
      - name: api_url
        data_type: varchar(255)
      - name: experiment_name
        data_type: varchar(255)
      - name: op
        data_type: char(1)
      - name: _dms_cdc_timestamp
        data_type: timestamptz

