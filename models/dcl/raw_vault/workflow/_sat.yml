      - name: record_source
        data_type: varchar(100)
      - name: hash_diff
        data_type: char(64)
        data_tests:
          - not_null
      - name: orcabus_id
        data_type: char(26)
      - name: execution_id
        data_type: varchar(255)
      - name: workflow_run_name
        data_type: varchar(255)
      - name: comment
        data_type: varchar(65535)
      - name: analysis_run_id
        data_type: char(26)
      - name: workflow_orcabus_id
        data_type: char(26)
      - name: workflow_name
        data_type: varchar(255)
      - name: workflow_version
        data_type: varchar(100)
      - name: workflow_execution_engine
