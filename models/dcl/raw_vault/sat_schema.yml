version: 2

models:

  - name: sat_sequencing_run_detail
    config:
      contract: { enforced: true }
    constraints:
      - type: primary_key
        columns: [ sequencing_run_hk, load_datetime ]
        warn_unenforced: false
      - type: foreign_key
        columns: [ sequencing_run_hk ]
        to: ref('hub_sequencing_run')
        to_columns: [ sequencing_run_hk ]
        warn_unenforced: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sequencing_run_hk
              - load_datetime
    columns:
      - name: sequencing_run_hk
        data_type: char(64)
        data_tests:
          - not_null
      - name: load_datetime
        data_type: timestamptz
        data_tests:
          - not_null
      - name: record_source
        data_type: varchar(255)
      - name: hash_diff
        data_type: char(64)
      - name: orcabus_id
        data_type: char(26)
      - name: status
        data_type: varchar(255)
      - name: start_time
        data_type: timestamptz
      - name: end_time
        data_type: timestamptz
      - name: reagent_barcode
        data_type: varchar(255)
      - name: flowcell_barcode
        data_type: varchar(255)
      - name: ica_project_id
        data_type: varchar(255)
      - name: v1pre3_id
        data_type: varchar(255)
      - name: basespace_run_id
        data_type: varchar(255)
      - name: experiment_name
        data_type: varchar(255)
